<!DOCTYPE html>
<html>
<head>
    <title>FlyDreamAir - Seat Selection</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Seat Selection</h1>
    <form action="services.html">

        <p>Select your seat from the layout below:</p>

        <!-- Example layout: 4 rows, 3-4-3 configuration -->
        <div class="seat-map">

            <!-- Row 1 -->
            <div class="row">
                <span>1A</span> <input type="radio" name="seat" value="1A">
                <span>1B</span> <input type="radio" name="seat" value="1B">
                <span>1C</span> <input type="radio" name="seat" value="1C">
                &nbsp;&nbsp;
                &nbsp;&nbsp;
                <span>1D</span> <input type="radio" name="seat" value="1D">
                <span>1E</span> <input type="radio" name="seat" value="1E">
                <span>1F</span> <input type="radio" name="seat" value="1F">
            </div>

            <!-- Row 2 -->
            <div class="row">
                <span>2A</span> <input type="radio" name="seat" value="2A">
                <span>2B</span> <input type="radio" name="seat" value="2B">
                <span>2C</span> <input type="radio" name="seat" value="2C">
                &nbsp;&nbsp;
                &nbsp;&nbsp;
                <span>2D</span> <input type="radio" name="seat" value="2D">
                <span>2E</span> <input type="radio" name="seat" value="2E">
                <span>2F</span> <input type="radio" name="seat" value="2F">
            </div>

            <!-- Row 3 -->
            <div class="row">
                <span>3A</span> <input type="radio" name="seat" value="3A">
                <span>3B</span> <input type="radio" name="seat" value="3B">
                <span>3C</span> <input type="radio" name="seat" value="3C">
                &nbsp;&nbsp;
                &nbsp;&nbsp;
                
                <span>3D</span> <input type="radio" name="seat" value="3D">
                <span>3E</span> <input type="radio" name="seat" value="3E">
                <span>3F</span> <input type="radio" name="seat" value="3F">
            </div>
            <input type="submit" value="Continue">
        </div>
    </form>

    <a href="flights.html">Back</a>
    <a href="search.html">Back to Search</a>
</body>
</html>
